name: Practica6
on:
  push:
jobs:
  instalacion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Instalar npm
        run: npm ci
      - name: Lanzar tests
        run: npm test

  despregamento:
    needs: instalacion
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Todo correcto
        run: echo "Despregamento completado"